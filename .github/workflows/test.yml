name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - backend/**
  pull_request:
    branches: [main]
    paths:
      - backend/**

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://prism:prism@localhost:5432/prism
      DATABASE_URL_SYNC: postgresql+psycopg2://prism:prism@localhost:5432/prism
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Load test dataset (1000 rows for CI speed)
        working-directory: backend
        run: python scripts/load_dataset.py
        env:
          TARGET_COUNT: "1000"

      - name: Run API and schema tests
        working-directory: backend
        run: pytest tests/test_api.py tests/test_schema.py -v --tb=short

      - name: Run latency tests
        working-directory: backend
        run: pytest tests/test_latency.py -v --tb=short
